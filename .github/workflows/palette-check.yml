name: Automatic Palette Check
on:
  pull_request_target:
    types:
      - opened
      - synchronize
      - reopened
    paths:
      - "**/*.json"
permissions:
  contents: read
  pull-requests: write
jobs:
  palette-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Automatic Palette Check
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          BASE_REF: ${{ github.base_ref }}
          HEAD_REF: ${{ github.head_ref }}
        run: |
          git fetch origin "$BASE_REF"

          if git diff --name-only --diff-filter=ACMRT origin/"$BASE_REF"...HEAD | grep -q '^registry\.json$'; then
            gh pr comment "$PR_NUMBER" --body "### Automatic Palette Check\nThis PR modifies \`registry.json\` directly. That file is auto-generated by the CI workflow and must never be edited manually — please remove it from your PR."
            exit 1
          fi

          diff_changes=$(git diff -U10000 --name-only --diff-filter=ACMRT origin/"$BASE_REF"...HEAD | grep '\.json$' | grep -v 'registry\.json' || true)

          if [ -z "$diff_changes" ]; then
            echo "No json files changed!"
            echo "The base ref checking: $BASE_REF"
            echo "The head ref checking: $HEAD_REF"
            exit 0
          fi

          declare -A table

          # Key is the path to the json field, value is the type of field
          table["dark"]="object"
          table["dark.mPrimary"]="string"
          table["dark.mOnPrimary"]="string"
          table["dark.mSecondary"]="string"
          table["dark.mOnSecondary"]="string"
          table["dark.mTertiary"]="string"
          table["dark.mOnTertiary"]="string"
          table["dark.mError"]="string"
          table["dark.mOnError"]="string"
          table["dark.mSurface"]="string"
          table["dark.mOnSurface"]="string"
          table["dark.mSurfaceVariant"]="string"
          table["dark.mOnSurfaceVariant"]="string"
          table["dark.mOutline"]="string"
          table["dark.mShadow"]="string"
          table["dark.mHover"]="string"
          table["dark.mOnHover"]="string"

          table["dark.terminal"]="object"
          table["dark.terminal.foreground"]="string"
          table["dark.terminal.background"]="string"
          table["dark.terminal.selectionFg"]="string"
          table["dark.terminal.selectionBg"]="string"
          table["dark.terminal.cursorText"]="string"
          table["dark.terminal.cursor"]="string"

          table["dark.terminal.normal"]="object"
          table["dark.terminal.normal.black"]="string"
          table["dark.terminal.normal.red"]="string"
          table["dark.terminal.normal.green"]="string"
          table["dark.terminal.normal.yellow"]="string"
          table["dark.terminal.normal.blue"]="string"
          table["dark.terminal.normal.magenta"]="string"
          table["dark.terminal.normal.cyan"]="string"
          table["dark.terminal.normal.white"]="string"

          table["dark.terminal.bright"]="object"
          table["dark.terminal.bright.black"]="string"
          table["dark.terminal.bright.red"]="string"
          table["dark.terminal.bright.green"]="string"
          table["dark.terminal.bright.yellow"]="string"
          table["dark.terminal.bright.blue"]="string"
          table["dark.terminal.bright.magenta"]="string"
          table["dark.terminal.bright.cyan"]="string"
          table["dark.terminal.bright.white"]="string"

          table["light"]="object"
          table["light.mPrimary"]="string"
          table["light.mOnPrimary"]="string"
          table["light.mSecondary"]="string"
          table["light.mOnSecondary"]="string"
          table["light.mTertiary"]="string"
          table["light.mOnTertiary"]="string"
          table["light.mError"]="string"
          table["light.mOnError"]="string"
          table["light.mSurface"]="string"
          table["light.mOnSurface"]="string"
          table["light.mSurfaceVariant"]="string"
          table["light.mOnSurfaceVariant"]="string"
          table["light.mOutline"]="string"
          table["light.mShadow"]="string"
          table["light.mHover"]="string"
          table["light.mOnHover"]="string"

          table["light.terminal"]="object"
          table["light.terminal.foreground"]="string"
          table["light.terminal.background"]="string"
          table["light.terminal.selectionFg"]="string"
          table["light.terminal.selectionBg"]="string"
          table["light.terminal.cursorText"]="string"
          table["light.terminal.cursor"]="string"

          table["light.terminal.normal"]="object"
          table["light.terminal.normal.black"]="string"
          table["light.terminal.normal.red"]="string"
          table["light.terminal.normal.green"]="string"
          table["light.terminal.normal.yellow"]="string"
          table["light.terminal.normal.blue"]="string"
          table["light.terminal.normal.magenta"]="string"
          table["light.terminal.normal.cyan"]="string"
          table["light.terminal.normal.white"]="string"

          table["light.terminal.bright"]="object"
          table["light.terminal.bright.black"]="string"
          table["light.terminal.bright.red"]="string"
          table["light.terminal.bright.green"]="string"
          table["light.terminal.bright.yellow"]="string"
          table["light.terminal.bright.blue"]="string"
          table["light.terminal.bright.magenta"]="string"
          table["light.terminal.bright.cyan"]="string"
          table["light.terminal.bright.white"]="string"

          comment_body=$(printf -- '### Automatic Palette Check')

          issues=0

          # PR Comment Title
          title_added=false
          file_title=""
          function check_file_title() {
            if [ "$title_added" = false ]; then
              title_added=true
              comment_body+="$file_title"
            fi
          }

          while IFS= read -r line; do
            # Check each file that it contains the necessary fields
            file=$line
            title_added=false
            file_title=$(printf -- '\n--- \n### File: %s' "$file")

            for key in "${!table[@]}"; do
              if ! jq ".$key | type" "$file" | grep "${table[${key}]}" >/dev/null; then
                check_file_title

                comment_body+=$(printf -- '\n- Missing required property `%s`' "$key")
                issues=$((issues + 1))
              fi
            done
          done <<<"$diff_changes"

          if [[ "$issues" -ne 0 ]]; then
            gh pr comment "$PR_NUMBER" --body "$comment_body"
            exit 1
          fi
